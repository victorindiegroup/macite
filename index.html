<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chronique des Empires</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1410">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chronique">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4ecd8;
    --paper-2: #ebe0c4;
    --ink: #2a2218;
    --ink-soft: #5a4a36;
    --gold: #b8923a;
    --rust: #a04830;
    --moss: #4a6b3a;
    --sea: #4a6f7d;
    --line: rgba(42, 34, 24, 0.18);

    --plain: #cbb878;
    --forest: #6a8a4a;
    --hill: #a89060;
    --mountain: #6e6358;
    --desert: #d9c285;
    --water: #6e9aa8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  .serif { font-family: 'Cormorant Garamond', serif; }
  .num { font-variant-numeric: tabular-nums; }

  /* ============== SPLASH / CIV CHOICE — thème épique or/sombre ============== */
  .screen { position: absolute; inset: 0; display: none; flex-direction: column; }
  .screen.active { display: flex; }

  #splash {
    padding: 24px 22px 28px;
    justify-content: flex-start;
    align-items: stretch;
    overflow-y: auto;
    background:
      radial-gradient(ellipse at 50% 30%, #1f1812 0%, #0c0907 70%) ;
    color: #e8dcc0;
  }
  #splash .hero {
    width: 60vw; max-width: 240px; aspect-ratio: 1;
    margin: 12px auto 18px;
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      0 12px 50px rgba(0,0,0,0.7),
      0 0 0 1px rgba(212,168,71,0.4),
      0 0 80px rgba(212,168,71,0.08);
    background: #0c0907;
  }
  #splash .hero img { width: 100%; height: 100%; display: block; }

  #splash .top { text-align: center; padding: 0 4px; }
  .title-main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px; font-weight: 700; line-height: 1.05; letter-spacing: -0.01em;
    color: #f4ecd8;
    text-shadow: 0 2px 24px rgba(0,0,0,0.6);
  }
  .title-main em {
    font-style: italic;
    color: #d4a847;
    background: linear-gradient(180deg, #f0cf78 0%, #c08c2a 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
    color: rgba(212,168,71,0.7); margin-top: 14px;
    font-weight: 500;
  }
  .subtitle::before, .subtitle::after {
    content: '·'; margin: 0 10px; color: rgba(212,168,71,0.5);
  }

  #splash .choose-label {
    text-align: center; font-size: 11px; letter-spacing: 0.28em;
    text-transform: uppercase; color: rgba(232,220,192,0.5);
    margin: 22px 12px 14px;
  }

  .civs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .civ-card {
    background: rgba(244, 236, 216, 0.04);
    border: 1.5px solid rgba(212, 168, 71, 0.25);
    padding: 14px 10px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .civ-card:hover, .civ-card:active {
    background: rgba(244, 236, 216, 0.08);
    border-color: rgba(212, 168, 71, 0.5);
  }
  .civ-card.selected {
    border-color: #d4a847;
    background: rgba(212, 168, 71, 0.12);
    box-shadow: 0 0 0 1px rgba(212,168,71,0.3), 0 6px 24px rgba(0,0,0,0.5);
  }
  .civ-card .emblem,
  .civ-card svg:not(.cname svg) { width: 48px; height: 48px; margin: 0 auto 6px; display: block; }
  .civ-card .cname {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-weight: 700;
    color: #f4ecd8;
  }
  .civ-card.selected .cname { color: #f0cf78; }
  .civ-card .cdesc {
    font-size: 11px; color: rgba(232,220,192,0.55);
    margin-top: 3px; line-height: 1.3;
  }

  .btn {
    background: var(--ink); color: var(--paper);
    border: none; padding: 16px 24px;
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    width: 100%;
  }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn.primary {
    background: linear-gradient(180deg, #d4a847 0%, #a07a28 100%);
    color: #1a1410;
    box-shadow: 0 4px 18px rgba(212,168,71,0.25), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn.primary:hover:not(:disabled) {
    background: linear-gradient(180deg, #e6ba52 0%, #b48830 100%);
  }
  .btn.primary:disabled {
    background: rgba(244,236,216,0.08);
    color: rgba(244,236,216,0.3);
    box-shadow: none;
  }
  .btn.ghost {
    background: transparent;
    color: rgba(232,220,192,0.7);
    border: 1.5px solid rgba(212,168,71,0.4);
  }
  .btn.ghost:hover { color: #f4ecd8; border-color: #d4a847; }
  .btn.small { padding: 10px 14px; font-size: 10px; width: auto; }

  /* ============== GAME ============== */
  #game { display: none; }
  #game.active { display: flex; }

  /* Top HUD */
  .hud-top {
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: 8px 12px;
    display: flex; justify-content: space-between; align-items: center;
    z-index: 10;
  }
  .hud-civ { display: flex; align-items: center; gap: 8px; }
  .hud-civ .emblem-mini { width: 28px; height: 28px; }
  .hud-civ .ctitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 700; line-height: 1;
  }
  .hud-civ .era {
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft);
  }
  .hud-turn { text-align: right; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft); }
  .hud-turn .num { font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: 0; }

  /* Resources strip */
  .hud-res {
    background: var(--paper-2);
    display: grid; grid-template-columns: repeat(5, 1fr);
    border-bottom: 1px solid var(--line);
  }
  .hud-res .r {
    padding: 6px 4px;
    text-align: center;
    border-right: 1px solid var(--line);
  }
  .hud-res .r:last-child { border-right: none; }
  .r-label { font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-soft); }
  .r-val { font-size: 14px; font-weight: 700; line-height: 1.1; }
  .r-rate { font-size: 9px; color: var(--moss); margin-top: 1px; }
  .r-rate.bad { color: var(--rust); }

  /* Map */
  .map-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #d6c8a8;
  }
  #mapSvg {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0;
    cursor: grab;
  }
  #mapSvg.grabbing { cursor: grabbing; }

  /* Bottom panel : contenu dynamique */
  .panel {
    background: var(--paper);
    border-top: 2px solid var(--ink);
    padding: 12px 14px 14px;
    max-height: 50vh;
    overflow-y: auto;
    transform: translateY(0);
    transition: transform 0.3s ease;
    position: relative;
    z-index: 5;
  }
  .panel.hidden { display: none; }
  .panel-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .panel-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; line-height: 1; }
  .panel-sub { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); margin-top: 2px; }
  .panel-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--ink-soft); padding: 4px 8px; }

  .panel-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--line);
    gap: 10px;
  }
  .panel-row:last-child { border-bottom: none; }
  .pr-info { flex: 1; min-width: 0; }
  .pr-name { font-weight: 600; font-size: 14px; }
  .pr-detail { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
  .pr-cost { font-size: 11px; color: var(--ink-soft); margin-top: 2px; font-variant-numeric: tabular-nums; }
  .pr-cost .bad { color: var(--rust); font-weight: 700; }
  .pr-action button {
    background: var(--ink); color: var(--paper);
    border: none; padding: 8px 12px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer;
  }
  .pr-action button:disabled { background: var(--paper-2); color: rgba(42,34,24,0.3); }
  .pr-action button.primary { background: var(--rust); color: var(--paper); }

  /* Bottom action bar (fixed) */
  .actionbar {
    background: var(--ink);
    color: var(--paper);
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px;
  }
  .ab-info { font-size: 11px; letter-spacing: 0.1em; }
  .ab-info .num { font-size: 16px; font-weight: 700; }
  .ab-end {
    background: var(--rust); color: var(--paper);
    border: none; padding: 12px 18px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    cursor: pointer;
  }
  .ab-end:disabled { background: rgba(244,236,216,0.15); color: rgba(244,236,216,0.4); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(20,16,10,0.7);
    display: none; align-items: center; justify-content: center;
    padding: 24px; z-index: 100;
  }
  .modal-bg.active { display: flex; }
  .modal {
    background: var(--paper); padding: 24px 22px;
    max-width: 360px; width: 100%; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-tag { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--rust); margin-bottom: 8px; }
  .modal h2 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.1; margin-bottom: 12px; }
  .modal p { color: var(--ink-soft); font-size: 14px; margin-bottom: 14px; line-height: 1.5; }
  .modal .actions { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }

  /* Toast */
  .toast {
    position: fixed; top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-200%);
    background: var(--ink); color: var(--paper);
    padding: 10px 18px; font-size: 12px; letter-spacing: 0.08em;
    transition: transform 0.4s ease;
    z-index: 200; max-width: 90vw; text-align: center;
    border-left: 3px solid var(--rust);
    visibility: hidden;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); visibility: visible; }

  /* Hex hover/select */
  .hex-base { transition: opacity 0.2s; }
  .hex-overlay { fill: none; stroke: rgba(42,34,24,0.15); stroke-width: 0.5; pointer-events: none; }
  .hex-fog {
    fill: var(--ink); fill-opacity: 0.85;
    pointer-events: none;
  }
  .hex-explored-no-vision { fill: rgba(42,34,24,0.35); pointer-events: none; }
  .hex-selected { stroke: var(--rust); stroke-width: 1.6; fill: none; pointer-events: none; }
  .hex-move-target { fill: rgba(74, 107, 58, 0.35); pointer-events: none; }
  .hex-attack-target { fill: rgba(160, 72, 48, 0.45); pointer-events: none; }

  /* Map labels */
  .city-label {
    fill: var(--paper); font-family: 'Cormorant Garamond', serif;
    font-weight: 700; font-size: 5px; text-anchor: middle;
    paint-order: stroke; stroke: var(--ink); stroke-width: 1.4; stroke-linejoin: round;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pop { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .modal { animation: pop 0.3s ease backwards; }
  .panel { animation: fadeIn 0.2s; }

  /* Tech tree mini */
  .tech-current {
    background: var(--paper-2); padding: 10px 12px; margin-bottom: 12px;
    border-left: 3px solid var(--gold);
  }
  .tech-current .label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); }
  .tech-current .name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; margin-top: 2px; }
  .tech-current .progress {
    height: 4px; background: rgba(0,0,0,0.1); margin-top: 6px;
  }
  .tech-current .progress-bar {
    height: 100%; background: var(--gold); transition: width 0.3s;
  }
  .tech-current .turns { font-size: 11px; color: var(--ink-soft); margin-top: 4px; }

  /* Scrollbar */
  .panel::-webkit-scrollbar, .modal::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-thumb, .modal::-webkit-scrollbar-thumb { background: var(--ink-soft); }
</style>
</head>
<body>

<!-- ============ SPLASH / CIV CHOICE ============ -->
<div id="splash" class="screen active">
  <div class="hero">
    <img src="logo-hero.png" alt="Chronique des Empires" loading="eager">
  </div>

  <div class="top">
    <div class="title-main">Chronique<br><em>des Empires</em></div>
    <div class="subtitle">Une partie en demi-journées</div>
  </div>

  <div>
    <div class="choose-label">Choisissez votre civilisation</div>
    <div class="civs" id="civsList"></div>

    <button id="startBtn" class="btn primary" disabled>
      Fonder l'empire
    </button>
    <button id="resumeBtn" class="btn ghost" style="margin-top: 8px; display:none;">
      Reprendre la partie
    </button>
  </div>
</div>

<!-- ============ GAME ============ -->
<div id="game" class="screen">
  <div class="hud-top">
    <div class="hud-civ">
      <svg class="emblem-mini" id="hudEmblem" viewBox="0 0 100 100"></svg>
      <div>
        <div class="ctitle" id="hudCivName">—</div>
        <div class="era" id="hudEra">Antiquité</div>
      </div>
    </div>
    <div class="hud-turn">
      <div>Tour</div>
      <div class="num" id="hudTurn">1</div>
    </div>
  </div>

  <div class="hud-res">
    <div class="r">
      <div class="r-label">Or</div>
      <div class="r-val num" id="rGold">0</div>
      <div class="r-rate" id="rGoldRate">+0</div>
    </div>
    <div class="r">
      <div class="r-label">Sci.</div>
      <div class="r-val num" id="rSci">0</div>
      <div class="r-rate" id="rSciRate">+0</div>
    </div>
    <div class="r">
      <div class="r-label">Prod.</div>
      <div class="r-val num" id="rProd">0</div>
      <div class="r-rate" id="rProdRate">+0</div>
    </div>
    <div class="r">
      <div class="r-label">Pop.</div>
      <div class="r-val num" id="rPop">0</div>
    </div>
    <div class="r">
      <div class="r-label">Villes</div>
      <div class="r-val num" id="rCities">0</div>
    </div>
  </div>

  <div class="map-wrap" id="mapWrap">
    <svg id="mapSvg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <!-- Bottom panel : contenu dynamique -->
  <div class="panel hidden" id="panel"></div>

  <!-- Action bar -->
  <div class="actionbar">
    <div class="ab-info">
      <div style="font-size:9px; letter-spacing:0.18em; text-transform:uppercase; opacity:0.7;">Action</div>
      <div style="display:flex; gap:14px; margin-top:2px;">
        <button class="btn small ghost" id="btnTech" style="color:var(--paper); border-color:var(--paper); padding:6px 10px; font-size:9px;">Recherche</button>
        <button class="btn small ghost" id="btnCities" style="color:var(--paper); border-color:var(--paper); padding:6px 10px; font-size:9px;">Villes</button>
        <button class="btn small ghost" id="btnMenu" style="color:var(--paper); border-color:var(--paper); padding:6px 10px; font-size:9px;">Menu</button>
      </div>
    </div>
    <button class="ab-end" id="btnEndTurn">Fin de tour</button>
  </div>
</div>

<!-- ============ MODAL ============ -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalContent"></div>
</div>

<!-- ============ TOAST ============ -->
<div class="toast" id="toast"></div>

<!-- Le code JS sera dans un fichier séparé pour la clarté -->
<script src="game.js"></script>
</body>
</html>
